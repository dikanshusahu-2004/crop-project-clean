<!DOCTYPE html>
<html>
<head>
  <title>Insurance Claim Review</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f4f6f9; }
    .card { border-radius:15px; }
    img { border-radius:10px; margin-top:10px; }
  </style>
</head>

<body>

<div class="container mt-5">
<div class="card shadow p-4">

<h3 class="text-primary mb-4">📑 Insurance Claim Verification</h3>

<!-- Farmer -->
<h5>Farmer Details</h5>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Mobile:</b> <span id="mobile"></span></p>
<p><b>Village:</b> <span id="village"></span></p>
<p><b>District:</b> <span id="district"></span></p>

<hr>

<!-- Crop -->
<h5>Crop Details</h5>
<p><b>Policy Number:</b> <span id="policy"></span></p>
<p><b>Crop:</b> <span id="crop"></span></p>
<p><b>Season:</b> <span id="season"></span></p>
<p><b>Damage Type:</b> <span id="damage"></span></p>
<p><b>Actual Yield:</b> <span id="yield"></span></p>
<p><b>Sum Insured:</b> ₹ <span id="sum"></span></p>

<hr>

<h5>Patwari Notes</h5>
<p id="notes"></p>

<hr>

<h5>Farmer Image</h5>
<img id="farmerImage" width="300">

<h5 class="mt-3">Survey Image</h5>
<img id="surveyImage" width="300">

<hr>

<button onclick="updateInsurance('Approved')" class="btn btn-success w-100">
  Approve Claim
</button>

<button onclick="updateInsurance('Rejected')" class="btn btn-danger mt-2 w-100">
  Reject Claim
</button>

<a href="insurance-dashboard.html" class="btn btn-secondary mt-2 w-100">
  Back
</a>

</div>
</div>

<script>

// 🔥 ID GET
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

// 🔥 LOAD DATA
function loadData() {
  fetch(`http://localhost:5000/api/app/${id}`)
    .then(res => res.json())
    .then(data => {

      console.log("DATA:", data);

      document.getElementById("name").innerText = data.name;
      document.getElementById("mobile").innerText = data.mobile;
      document.getElementById("village").innerText = data.village;
      document.getElementById("district").innerText = data.district;

      document.getElementById("policy").innerText = data.policy_number;
      document.getElementById("crop").innerText = data.crop_name;
      document.getElementById("season").innerText = data.season;
      document.getElementById("damage").innerText = data.damage_type;

      document.getElementById("yield").innerText = data.actualYield || "N/A";
      document.getElementById("sum").innerText = data.sum_insured;

      document.getElementById("notes").innerText = data.patwariNotes || "No Notes";

      if(data.image){
        document.getElementById("farmerImage").src =
          "http://localhost:5000/uploads/" + data.image;
      }

      if(data.surveyImage){
        document.getElementById("surveyImage").src =
          "http://localhost:5000/uploads/" + data.surveyImage;
      }

    });
}

loadData();

// 🔥 INSURANCE UPDATE
function updateInsurance(status) {

  fetch(`http://localhost:5000/api/app/insurance/${id}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ status })
  })
  .then(res => res.json())
  .then(data => {
  alert("Uploaded ✅");

  document.getElementById("surveyPreview").src =
    "http://localhost:5000/uploads/" + data.filename;
});
}

</script>

</body>
</html>
