<!DOCTYPE html>
<html>
<head>
  <title>Bank Claim View</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
   
</head>

<body class="bg-light">

<div class="container mt-4">
<div class="card p-4 shadow">

<h3 class="mb-3">📄 Claim Details</h3>

<!-- FARMER -->
<h5>👨‍🌾 Farmer Details</h5>
<p><b>Name:</b> <span id="name"></span></p>
<p><b>Mobile:</b> <span id="mobile"></span></p>
<p><b>Village:</b> <span id="village"></span></p>
<p><b>District:</b> <span id="district"></span></p>

<hr>

<!-- INSURANCE -->
<h5>🌾 Insurance Details</h5>
<p><b>Crop:</b> <span id="crop"></span></p>
<p><b>Season:</b> <span id="season"></span></p>
<p><b>Damage Type:</b> <span id="damage"></span></p>
<p><b>Sum Insured:</b> ₹ <span id="sum"></span></p>
<p><b>Status:</b> <span id="status"></span></p>

<hr>

<!-- BANK -->
<h5>🏦 Bank Details</h5>
<p><b>Bank Name:</b> <span id="bank"></span></p>
<p><b>Account:</b> <span id="account"></span></p>
<p><b>IFSC:</b> <span id="ifsc"></span></p>

<hr>

<!-- APPROVE -->
<h5>✅ Approval</h5>

<button onclick="approveClaim()" class="btn btn-success w-100">
Approve
</button>

<button onclick="rejectClaim()" class="btn btn-danger mt-2 w-100">
Reject
</button>

<hr>

<!-- PAYMENT -->
<h5>💰 Payment</h5>

<div id="paymentSection">

  <label>From Bank Account</label>
  <input type="text" id="fromAccount" class="form-control" placeholder="Bank Account">

  <label class="mt-2">To Farmer Account</label>
  <input type="text" id="toAccount" class="form-control" placeholder="Farmer Account">

  <label class="mt-2">Amount</label>
  <input type="number" id="amount" class="form-control">

  <button onclick="payNow()" class="btn btn-primary mt-3 w-100">
    💸 Transfer Payment
  </button>

  <hr>


</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<script>

// 🔥 GET ID
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

// 🔥 LOAD DATA
function loadData(){
  fetch(`http://localhost:5000/api/app/${id}`)
  .then(res => res.json())
  .then(data => {

    console.log("BANK DATA:", data);

    document.getElementById("name").innerText = data.name;
    document.getElementById("mobile").innerText = data.mobile;
    document.getElementById("village").innerText = data.village;
    document.getElementById("district").innerText = data.district;

    document.getElementById("crop").innerText = data.crop_name;
    document.getElementById("season").innerText = data.season;
    document.getElementById("damage").innerText = data.damage_type;
    document.getElementById("sum").innerText = data.sum_insured;
    document.getElementById("status").innerText = data.insuranceStatus;

    document.getElementById("bank").innerText = data.bank_name;
    document.getElementById("account").innerText = data.account_number;
    document.getElementById("ifsc").innerText = data.ifsc_code;

    // PAYMENT UI
    // PAYMENT UI
if(data.bankStatus === "Approved"){

  document.getElementById("paymentSection").innerHTML = `
    
    <label>From Bank Account</label>
    <input type="text" id="fromAccount" class="form-control"
           placeholder="Bank Account">

    <label class="mt-2">To Farmer Account</label>
    <input type="text" id="toAccount" class="form-control"
           placeholder="Farmer Account">

    <label class="mt-2">Amount</label>
    <input type="number" id="amount" class="form-control"
           value="${data.sum_insured}">

    <button onclick="payNow()" class="btn btn-primary mt-3 w-100">
      💸 Transfer Payment
    </button>

  `;

} 
else if(data.bankStatus === "Paid"){

  document.getElementById("paymentSection").innerHTML = `
    <div class="alert alert-success">
      <h5>✅ Payment Completed</h5>
      <p><b>Transaction ID:</b> ${data.transactionId || "N/A"}</p>
      <p><b>Date:</b> ${data.paymentDate || "N/A"}</p>
    </div>
  `;

} 
else {

  document.getElementById("paymentSection").innerHTML = `
    <div class="alert alert-warning">
      Pending Approval
    </div>
  `;

    }

  });
}

loadData();

// 🔥 APPROVE
function approveClaim(){
  fetch(`http://localhost:5000/api/app/bank/${id}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: "Approved" })
  })
  .then(res => res.json())
  .then(() => {
    alert("Approved ✅");
    loadData();
  });
}

// 🔥 REJECT
function rejectClaim(){
  fetch(`http://localhost:5000/api/app/bank/${id}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status: "Rejected" })
  })
  .then(res => res.json())
  .then(() => {
    alert("Rejected ❌");
    loadData();
  });
}

// 🔥 PAYMENT
function payNow(){

  const fromAccount = document.getElementById("fromAccount").value;
  const toAccount = document.getElementById("toAccount").value;
  const amount = document.getElementById("amount").value;

  if(!fromAccount || !toAccount || !amount){
    alert("Fill all fields ❌");
    return;
  }

  fetch(`http://localhost:5000/api/app/pay/${id}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      fromAccount,
      toAccount,
      amount
    })
  })
  .then(res => res.json())
  .then(data => {

    alert("Payment Successful ✅");

    showReceipt(data); // 👈 IMPORTANT

  })
  .catch(err => {
    console.log(err);
    alert("Payment Failed ❌");
  });
}



function showReceipt(data){

  document.getElementById("paymentSection").innerHTML = `

    <div id="receiptBox">   <!-- 👈 THIS IS IMPORTANT -->

      <div class="alert alert-success">

        <h5>✅ Payment Successful</h5>

        <p><b>Transaction ID:</b> ${data.transactionId}</p>

        <p><b>From:</b> ${data.fromAccount}</p>

        <p><b>To:</b> ${data.toAccount}</p>

        <p><b>Amount:</b> ₹ ${data.amount}</p>

        <p><b>Date:</b> ${new Date(data.date).toLocaleString()}</p>

        <button onclick="downloadReceipt()" class="btn btn-dark w-100 mt-2">
          📄 Download Receipt
        </button>

      </div>

    </div>

  `;
}


function downloadReceipt(){

  const element = document.getElementById("receiptBox");

  if(!element){
    alert("Receipt not found ❌");
    return;
  }

  html2pdf()
    .from(element)
    .set({
      margin: 0.5,
      filename: "receipt.pdf",
      html2canvas: { scale: 2 },
      jsPDF: { unit: "in", format: "a4", orientation: "portrait" }
    })
    .save();
}

</script>

</body>
</html>
