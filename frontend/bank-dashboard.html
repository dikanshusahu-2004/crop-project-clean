<!DOCTYPE html>
<html>
<head>
<title>Bank Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<h3>🏦 Bank Dashboard</h3>

<table class="table table-bordered mt-3">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Crop</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableData"></tbody>

</table>

</div>

<script>

fetch("http://localhost:5000/api/app/bank")
.then(res => res.json())
.then(data => {

  let html = "";

  data.forEach(c => {
    html += `
    <tr>
      <td>${c.applicationId}</td>
      <td>${c.name}</td>
      <td>${c.crop_name}</td>
      <td>${c.bankStatus || "Pending"}</td>
      <td>
        <a href="bank-view.html?id=${c._id}" class="btn btn-primary btn-sm">
          View
        </a>
      </td>
    </tr>
    `;
  });

  document.getElementById("tableData").innerHTML = html;

});

</script>

</body>
</html>
