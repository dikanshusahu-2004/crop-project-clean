<!DOCTYPE html>
<html>

<head>
  <title>Transaction History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h3 class="text-primary">💰 Transaction History</h3>

<table class="table table-bordered mt-3">

<thead>
<tr>
<th>ID</th>
<th>Farmer</th>
<th>Amount</th>
<th>Transaction ID</th>
<th>Date</th>
</tr>
</thead>

<tbody id="tableBody">
<!-- JS se data aayega -->
</tbody>

</table>

<a href="bank-dashboard.html" class="btn btn-secondary">Back</a>

</div>

<script>

// 🔥 LOAD TRANSACTIONS
fetch("http://localhost:5000/api/app/transactions")
.then(res => res.json())
.then(data => {

  console.log("TRANSACTION DATA:", data);

  const tbody = document.getElementById("tableBody");

  tbody.innerHTML = "";

  data.forEach(d => {

    const row = `
      <tr>
        <td>${d._id}</td>
        <td>${d.name}</td>
        <td>₹ ${d.sum_insured || 0}</td>
        <td>${d.transactionId || "N/A"}</td>
        <td>${d.paymentDate || "N/A"}</td>
      </tr>
    `;

    tbody.innerHTML += row;

  });

})
.catch(err => {
  console.log(err);
  alert("Error loading transactions ❌");
});


</script>

</body>
</html>
