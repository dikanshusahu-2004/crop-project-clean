<!DOCTYPE html>
<html>
<head>
<title>Application Status</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

.card {
    border-radius: 12px;
}
</style>

</head>

<body>

<div class="container mt-5">
<div class="card shadow p-4">

<h3 class="text-success mb-4">📊 Your Applications</h3>

<table class="table table-bordered table-hover">
<thead class="table-success">
<tr>
<th>ID</th>
<th>Crop</th>
<th>Village</th>
<th>Damage</th>
<th>Patwari</th>
<th>Insurance</th>
<th>Bank</th>
</tr>
</thead>

<tbody id="tableBody">
</tbody>

</table>

<a href="dashboard.html" class="btn btn-secondary">Back</a>

</div>
</div>

<script>
fetch("http://localhost:5000/api/app/status")
.then(res => res.json())
.then(data => {

  let rows = "";

  data.forEach((row, index) => {

    rows += `
      <tr>
        <td>${row.applicationId}</td>   <!-- Application Number -->
        <td>${row.crop_name}</td>       <!-- ✅ YAHAN -->
        <td>${row.village}</td>         <!-- ✅ YAHAN -->
        <td>${row.damage_type}</td>     <!-- ✅ YAHAN -->

        <td><span class="badge bg-warning">${row.patwariStatus}</span></td>
        <td><span class="badge bg-warning">${row.insuranceStatus}</span></td>
        <td><span class="badge bg-warning">${row.bankStatus}</span></td>
      </tr>
    `;
  });

  document.getElementById("tableBody").innerHTML = rows;

});
</script>
</body>
</html>
