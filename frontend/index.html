<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PMFBY Crop Insurance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌾 AI-Based Crop Insurance System</h1>
    <h2>(PMFBY - Pradhan Mantri Fasal Bima Yojana)</h2>

    <h3>📌 How It Works</h3>

    <div class="steps">

        <div class="step">
            <h4>👨‍🌾 Farmer</h4>
            <p>Login & Upload Crop Image</p>
        </div>

        <div class="arrow">➡️</div>

        <div class="step">
            <h4>🧑‍💼 Patwari</h4>
            <p>Verifies Crop Damage</p>
        </div>

        <div class="arrow">➡️</div>

        <div class="step">
            <h4>🏢 Insurance</h4>
            <p>Approves Claim</p>
        </div>

        <div class="arrow">➡️</div>

        <div class="step">
            <h4>🏦 Bank</h4>
            <p>Processes Payment</p>
        </div>

    </div>

    <button onclick="goToLogin()">🚀 Farmer Login</button>
</div>

<script src="script.js"></script>

</body>
</html>
