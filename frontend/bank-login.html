<!DOCTYPE html>
<html>
<head>
<title>Bank Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 mx-auto" style="max-width:400px;">

<h3 class="text-center">🏦 Bank Login</h3>

<input type="text" id="username" class="form-control mt-3" placeholder="Username">
<input type="password" id="password" class="form-control mt-3" placeholder="Password">

<button onclick="login()" class="btn btn-success w-100 mt-3">Login</button>

<p id="msg" class="text-danger mt-2 text-center"></p>

</div>

</div>

<script>

function login(){

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  fetch("http://localhost:5000/api/auth/bank-login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ username, password })
  })
  .then(res => res.json())
  .then(data => {

    if(data.success){
      alert("Login Success ✅");
      window.location.href = "bank-dashboard.html";
    } else {
      document.getElementById("msg").innerText = "Invalid Login ❌";
    }

  });

}

</script>

</body>
</html>
