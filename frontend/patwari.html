<!DOCTYPE html>
<html>
<head>
<title>Patwari Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  background: linear-gradient(to right, #198754, #14532d);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.card{
  width:400px;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="card shadow p-4">
<h3 class="text-center text-success mb-4">🌾 Patwari Login</h3>

<input type="text" id="username" class="form-control mb-3" placeholder="Username">
<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<button onclick="login()" class="btn btn-success w-100">Login</button>
</div>

<script>
function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(username==="patwari" && password==="1234"){
    localStorage.setItem("patwari","true");
    window.location.href="patwari-dashboard.html";
  } else {
    alert("Invalid Login ❌");
  }
}
</script>

</body>
</html>
