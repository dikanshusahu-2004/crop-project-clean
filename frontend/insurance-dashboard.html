<!DOCTYPE html>
<html>
<head>
  <title>Insurance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between">
  <h3 class="text-primary">🏢 Insurance Dashboard</h3>
  <button onclick="logout()" class="btn btn-danger">Logout</button>
</div>

<table class="table table-bordered mt-3">
<thead class="table-primary">
<tr>
  <th>ID</th>
  <th>Name</th>
  <th>Village</th>
  <th>Crop</th>
  <th>Damage</th>
  <th>Status</th>
  <th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script>

if(!localStorage.getItem("insurance")){
  window.location.href="insurance.html";
}

function logout(){
  localStorage.removeItem("insurance");
  window.location.href="insurance.html";
}

// 🔥 DATA LOAD
fetch("http://localhost:5000/api/app/insurance")
  .then(res => res.json())
  .then(data => {

    console.log("🔥 FRONTEND DATA:", data);

    let rows = "";

    data.forEach(row => {
      rows += `
      <tr>
        <td>${row.applicationId}</td>
        <td>${row.name}</td>
        <td>${row.village}</td>
        <td>${row.crop_name}</td>
        <td>${row.damage_type}</td>
        <td>${row.insuranceStatus || "Pending"}</td>
        <td>
          <button onclick="review('${row._id}')">Review</button>
        </td>
      </tr>
      `;
    });

    document.getElementById("data").innerHTML = rows;
});
function review(id){
  window.location.href = "insurance-verify.html?id=" + id;
}
</script>

</body>
</html>
