<!DOCTYPE html>
<html>
<head>
  <title>Insurance Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background: linear-gradient(to right, #0d6efd, #003366);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .card{
      width:400px;
      border-radius:15px;
    }
  </style>
</head>

<body>

<div class="card shadow p-4">
  <h3 class="text-center text-primary mb-4">🏢 Insurance Login</h3>

  <input id="username" class="form-control mb-2" placeholder="Username">
  <input id="password" type="password" class="form-control mb-3" placeholder="Password">

  <button onclick="login()" class="btn btn-primary w-100">Login</button>
</div>

<script>
function login(){
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;

  if(u==="admin" && p==="1234"){
    localStorage.setItem("insurance", true);
    window.location.href="insurance-dashboard.html";
  } else {
    alert("Invalid Login ❌");
  }
}
</script>

</body>
</html>
