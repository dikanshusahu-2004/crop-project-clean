<!DOCTYPE html>
<html>
<head>
<title>Patwari Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<div class="d-flex justify-content-between">
<h3 class="text-success">📋 Patwari Dashboard</h3>
<button onclick="logout()" class="btn btn-danger">Logout</button>
</div>

<table class="table table-bordered mt-3">
<thead class="table-success">
<tr>
<th>ID</th>
<th>Name</th>
<th>Crop</th>
<th>Village</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>
</div>

<script>

if(!localStorage.getItem("patwari")){
  window.location.href="patwari.html";
}

function logout(){
  localStorage.removeItem("patwari");
  window.location.href="patwari.html";
}

fetch("http://localhost:5000/api/app/status")
.then(res=>res.json())
.then(data=>{
  let rows="";

  data.forEach(row=>{
    rows+=`
    <tr>
      <td>${row.applicationId}</td>
      <td>${row.name}</td>
      <td>${row.crop_name}</td>
      <td>${row.village}</td>
      <td>${row.patwariStatus}</td>

      <td>
        <button onclick="verify('${row._id}')" class="btn btn-primary btn-sm">
          Verify
        </button>
      </td>
    </tr>
    `;
  });

  document.getElementById("data").innerHTML=rows;
});

function verify(id){
  window.location.href = `verify.html?id=${id}`;
}

</script>

</body>
</html>
